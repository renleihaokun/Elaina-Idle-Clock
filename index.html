<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>伊蕾娜の魔法手账</title>
    
    <!-- 外部资源 -->
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    
    <!-- 本地样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 课表上传隐藏输入 -->
    <input type="file" id="ics-upload" accept=".ics" style="display: none;">

    <!-- 背景层 -->
    <div id="magic-flash"></div>
    <div id="bg1" class="bg-layer"></div>
    <div id="bg2" class="bg-layer"></div>
    <div id="particle-container"></div>

    <!-- UI 组件 -->
    <main>
        <!-- 左上：时间与天气 -->
        <section class="widget top-left">
            <time id="time" onclick="togglePanel('settings-panel')" title="点击调整组件大小">00:00</time>
            <div class="date-info">
                <span id="date">--月--日 星期-</span>
                <span id="lunar-date">农历--</span>
                <span id="holiday-tag"></span>
            </div>
            <div class="weather-module" onclick="togglePanel('location-panel')" title="点击手动配置地区">
                <span id="weather-main">🪄 天气感知中...</span>
                <span id="weather-details"></span>
                <span id="weather-advice"></span>
            </div>
        </section>

        <!-- 右上：状态信息 -->
        <section class="widget top-right">
            <span id="battery">🔋 --%</span>
            <span id="weekend-countdown">周末计算中...</span>
        </section>

        <!-- 左下：一言 -->
        <section class="widget bottom-left" onclick="fetchWitchQuote()" title="获取魔女的洞察">
            <span id="hitokoto-text">魔女正在记录世界...</span>
            <span id="hitokoto-author"></span>
        </section>

        <!-- 右下：课表与进度 -->
        <section class="widget bottom-right">
            <div id="course-module" onclick="document.getElementById('ics-upload').click()">
                <span id="course-title">📅 点击导入课表(.ics)</span>
                <span id="course-info">支持 WakeUp 导出文件</span>
            </div>
            <hr class="divider">
            <div class="progress-label">
                <span>今日进度</span><span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </section>
    </main>

    <!-- 弹出面板 -->
    <aside>
        <!-- 缩放控制面板 -->
        <div id="settings-panel" class="modal-panel">
            <h3 style="color: #ffeb3b;">⚙️ 魔法手账设置</h3>
            <p>组件缩放比例: <span id="scale-value">100%</span></p>
            <input type="range" id="scale-slider" min="0.5" max="1.5" step="0.05" value="1">
            <button class="close-btn" onclick="togglePanel('settings-panel')">完成</button>
        </div>

        <!-- 气象定位面板 -->
        <div id="location-panel" class="modal-panel">
            <h3>📍 气象定位仪</h3>
            <div class="loc-input-group">
                <input type="text" id="loc-input" placeholder="输入城市或区县 (如:海淀区)">
                <button id="loc-search-btn" onclick="searchLocation()">搜索</button>
            </div>
            <button class="close-btn" style="width:100%; margin: 0 0 15px 0; background: rgba(161, 196, 253, 0.7); color: #000; font-weight: bold;" onclick="autoLocate()">🎯 自动获取当前精准坐标</button>
            <div id="loc-results"></div>
            <button class="close-btn" onclick="togglePanel('location-panel')">关闭</button>
        </div>
    </aside>

    <!-- 核心逻辑 -->
    <script src="script.js" defer></script>
</body>
</html>
